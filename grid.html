    <title>Taller 2 - Grid</title>

<body>
    <div class="container">

        <header class="header">
            <h1>Modelo Grid</h1>
        </header>

        <nav class="nav" aria-label="Navegación principal del Taller 2">
            <ul>
                <li><a href="./">Inicio</a></li>
                <li><a href="multimedia.html">Multimedia</a></li>
                <li><a href="grid.html" class="activo">Grid</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

        <main class="main">
            <article class="article">
                <h2>Estructura con CSS Grid</h2>
                <div class="grid">
                    <header class="grid-cell header-cell">
                        El header Grid (Ocupa todas las columnas)
                    </header>
                    <aside class="aside-cell">
                        Sidebar
                    </aside>
                    <main class="main-cell">
                        Contenido principal
                    </main>
                    <section class="section-cell">
                        Sección 1
                    </section>
                    <section class="section-cell">
                        Sección 2
                    </section>
                    <footer class="footer-cell">
                        El footer del grid (ocupa toda la columna)
                    </footer>
                </div>
            </article>

            <div class="bento-grid">
            </div>
        </main>

        <footer class="footer">
            <p>Santiago Avendaño Zapata. Todos los derechos reservados &copy; 2026.</p>
        </footer>

    </div>
</body>
